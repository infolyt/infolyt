[book]
title       = "Infolyt Documentation"
description = "Complete filesystem intelligence — index, analyse, organise."
authors     = ["Infolyt Contributors"]
language    = "en"
src         = "src"

[output.html]
site-url          = "https://docs.infolyt.dev/"
