# .github/ISSUE_TEMPLATE/bug_report.yml
name: Bug Report
description: Something isn't working
labels: ["bug", "needs-triage"]
body:
  - type: input
    id: version
    attributes:
      label: Infolyt version
      placeholder: "infolyt --version"
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options: [Windows, macOS, Linux]
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Clear description of the bug
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Run `infolyt scan ~/Downloads`
        2. ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
    validations:
      required: true